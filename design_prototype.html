<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SigmaCog EEG — Design Prototype v6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS  —  40+ operator readability first
   Base: 16px  |  min text: 12px  |  UI controls: 14px
═══════════════════════════════════════════════════════ */
:root {
  /* ── Dark ocean palette — drawn from EEG_logo.svg (#72c4a9 / #4bb9db / #9fc65c) ── */
  --bg:    #131e28;   /* deep blue-black (not purple) */
  --bg2:   #1a2e3a;   /* panel background */
  --bg3:   #223a4a;   /* elevated surface */
  --bg4:   #0d1720;   /* void / deepest */

  /* ── Logo-derived accent palette ── */
  --teal:  #5cc4a8;   /* logo #72c4a9 brightened — primary accent */
  --cyan:  #52b8d8;   /* logo #4bb9db */
  --green: #80c854;   /* logo #9fc65c */
  --amber: #d8b84a;   /* warm gold */
  --rose:  #dc7860;   /* logo #e2775a */
  --red:   #d07070;   /* error state */
  --plum:  #9870b8;   /* soft purple — section glyph accent */
  --mauve: #bca8dc;   /* lighter purple — active state highlight */
  --dim:   #284050;

  --cream: #c8e0d8;   /* teal-cream — primary text */
  --text:  #88b0a8;   /* body text */
  --muted: #578888;   /* labels / secondary */
  --faint: #305868;   /* placeholders / hints */

  --border:  rgba(72,186,166,0.15);
  --border2: rgba(72,186,166,0.30);

  --d1:#52b8d8; --d2:#80c854; --d3:#dc7860; --d4:#b060c8;

  /* scale */
  --t-xl:   1.35rem;   /* 21.6px big numbers */
  --t-lg:   1.05rem;   /* 16.8px  */
  --t-base: 0.9375rem; /* 15px body */
  --t-sm:   0.8125rem; /* 13px controls */
  --t-xs:   0.75rem;   /* 12px labels */
  --t-xxs:  0.6875rem; /* 11px abs min */
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; }
body {
  background:var(--bg); color:var(--text);
  font-family:'IBM Plex Mono','PingFang TC','Noto Sans TC',monospace;
  font-weight:400; font-size:var(--t-base);
  -webkit-font-smoothing:antialiased;
  height:100vh; overflow:hidden;
}
button, input, select, textarea { font-family:inherit; }
button { cursor:pointer; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--dim); border-radius:2px; }

@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
@keyframes waveScr{ from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ═══════════════════════════════════════════════════════
   SHARED ATOMS
═══════════════════════════════════════════════════════ */

/* Section heading */
.sh {
  display:flex; align-items:center; gap:.28rem;
  font-size:var(--t-xs); color:var(--muted);
  letter-spacing:.13em; text-transform:uppercase;
  padding-bottom:.28rem; border-bottom:1px solid var(--border);
  margin-bottom:.6rem; flex-shrink:0;
}
.sh-g { font-family:'Crimson Pro',Georgia,serif; font-style:italic; font-size:1.05rem; color:var(--plum); line-height:1; }

/* Buttons */
.btn {
  padding:.36rem .72rem; border-radius:3px;
  border:1px solid var(--border2); background:var(--bg3);
  color:var(--text); font-size:var(--t-sm); font-weight:400;
  cursor:pointer; transition:all .15s; white-space:nowrap; flex-shrink:0;
}
.btn:hover { color:var(--cream); border-color:rgba(72,186,166,.45); }
.btn-sm   { padding:.22rem .5rem; font-size:var(--t-xs); }
.btn-lg   { width:100%; padding:.65rem 1rem; font-size:var(--t-base); font-weight:500;
            display:flex; align-items:center; justify-content:center; gap:.45rem; }
.btn-green{ border-color:rgba(98,184,130,.45); color:var(--green); }
.btn-green:hover { background:rgba(98,184,130,.12); }
.btn-red  { border-color:rgba(192,112,114,.45); color:var(--red); }
.btn-red:hover   { background:rgba(192,112,114,.12); }
.btn-mauve{ border-color:rgba(72,186,166,.45); color:var(--mauve); }
.btn-mauve:hover { background:rgba(72,186,166,.12); }
.btn-teal { border-color:rgba(72,186,166,.45); color:var(--teal); }
.btn-teal:hover  { background:rgba(72,186,166,.12); }
.btn-amber{ border-color:rgba(200,160,96,.4); color:var(--amber); }
.btn-amber:hover { background:rgba(200,160,96,.08); }

/* Form fields */
.ff { margin-bottom:.55rem; }
.fl { display:block; font-size:var(--t-xs); color:var(--muted); letter-spacing:.07em; text-transform:uppercase; margin-bottom:.2rem; }
.fi {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:3px; padding:.36rem .48rem; color:var(--cream);
  font-size:var(--t-sm); outline:none; transition:border-color .15s;
}
.fi:focus { border-color:rgba(72,186,166,.55); }
.fi::placeholder { color:var(--faint); }
textarea.fi { resize:none; }
.fsel {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:3px; padding:.36rem .48rem; color:var(--cream);
  font-size:var(--t-sm); outline:none; appearance:none; cursor:pointer;
}
.fsel option { background:var(--bg3); color:var(--cream); }
.frow { display:flex; gap:.4rem; }
.frow .ff { flex:1; }
.sex-tog { display:flex; gap:1px; background:var(--border); border-radius:3px; overflow:hidden; }
.sex-btn { flex:1; padding:.3rem .1rem; border:none; background:var(--bg3); color:var(--muted); font-size:var(--t-xs); cursor:pointer; transition:all .15s; }
.sex-btn.on { background:rgba(72,186,166,.22); color:var(--mauve); }

/* Toggle switch */
.tog-row { display:flex; align-items:center; gap:.45rem; cursor:pointer; font-size:var(--t-sm); color:var(--text); }
.tog-row input[type=checkbox] { accent-color:var(--mauve); width:14px; height:14px; cursor:pointer; }

/* Warning */
.warn {
  background:rgba(200,160,96,.10); border:1px solid rgba(200,160,96,.3);
  border-radius:3px; padding:.4rem .5rem; font-size:var(--t-xs); color:var(--amber);
  line-height:1.55; margin-bottom:.5rem;
}

/* ═══════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════ */
#app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* HEADER */
#header {
  flex-shrink:0; height:52px; background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 1.1rem; gap:.7rem;
}
.logo-glyph {
  font-family:'Crimson Pro',Georgia,serif; font-style:italic;
  font-size:2.1rem; color:var(--plum); line-height:1; letter-spacing:-.03em;
}
.logo-title { font-size:.9rem; color:var(--cream); letter-spacing:.12em; text-transform:uppercase; font-weight:500; line-height:1.2; }
.logo-sub   { font-size:.7rem; color:var(--muted); letter-spacing:.04em; margin-top:.04rem; }
.hd-sep     { width:1px; height:28px; background:var(--border); flex-shrink:0; margin:0 .1rem; }
.hd-label   { font-size:var(--t-xs); color:var(--muted); white-space:nowrap; }
.dev-count-btn {
  width:34px; height:34px; border:1px solid var(--border2); border-radius:3px;
  background:var(--bg3); color:var(--cream); font-size:var(--t-base);
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.dev-count-btn:hover { border-color:rgba(72,186,166,.5); color:var(--mauve); }
.dev-count-num { font-family:'Crimson Pro',serif; font-size:1.55rem; color:var(--teal); line-height:1; min-width:22px; text-align:center; }
.hd-right { margin-left:auto; display:flex; align-items:center; gap:.55rem; }
.lang-toggle { display:flex; gap:1px; background:var(--border); }
.lang-btn { padding:.24rem .52rem; border:none; background:var(--bg2); color:var(--muted); font-size:var(--t-xs); cursor:pointer; transition:all .15s; }
.lang-btn.on { background:var(--bg3); color:var(--mauve); }

/* BANNER */
#banner {
  flex-shrink:0; background:var(--bg4); border-bottom:2px solid var(--border);
  display:flex; align-items:stretch; min-height:54px; overflow:hidden;
}
.banner-sync {
  flex-shrink:0; display:flex; align-items:center; gap:.55rem;
  padding:0 1rem; border-right:1px solid var(--border);
}
.banner-sync-lbl { font-size:var(--t-xxs); color:var(--faint); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
.banner-devs { flex:1; display:flex; align-items:center; overflow-x:auto; padding:.35rem .6rem; gap:.5rem; }

/* Banner device card */
.bdc {
  flex-shrink:0; min-width:190px;
  background:var(--bg2); border:1px solid var(--border); border-radius:4px;
  padding:.38rem .65rem; display:flex; align-items:center; gap:.55rem;
  position:relative; overflow:hidden; cursor:pointer; transition:border-color .15s;
}
.bdc::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--dc,var(--dim)); }
.bdc:hover   { border-color:var(--border2); }
.bdc-dot     { width:10px; height:10px; border-radius:50%; background:var(--dim); flex-shrink:0; transition:background .3s; }
.bdc.conn .bdc-dot { background:var(--teal); }
.bdc.rec  .bdc-dot { background:var(--green); animation:pulse 1.2s infinite; }
.bdc-name   { font-size:var(--t-sm); color:var(--cream); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bdc-detail { font-size:var(--t-xxs); color:var(--muted); }
.bdc-prog   { height:3px; background:rgba(255,255,255,.07); border-radius:2px; margin-top:.15rem; }
.bdc-prog-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--plum),var(--green)); transition:width .5s; }
.bdc-elapsed { font-family:'Crimson Pro',serif; font-size:1.15rem; color:var(--cream); line-height:1; }
.bdc-qual    { font-size:var(--t-xxs); color:var(--green); }

/* MAIN */
#main { flex:1; overflow:hidden; display:flex; }

/* ═══════════════════════════════════════════════════════
   SINGLE-DEVICE  —  3 equal columns
═══════════════════════════════════════════════════════ */
.single-layout { display:flex; flex:1; gap:1px; background:var(--border); overflow:hidden; animation:fadeUp .2s ease; }

/* every column is 1/3 */
.col { flex:1; min-width:0; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }
.col-inner { padding:.85rem .8rem; display:flex; flex-direction:column; flex:1; overflow-y:auto; }

/* ── Col 1: Connect + big impedance brain ── */
/* Connection card */
.cc {
  flex-shrink:0; background:var(--bg2); border:1px solid var(--border); border-radius:4px;
  padding:.65rem .75rem; margin-bottom:.6rem; position:relative; overflow:hidden;
}
.cc::before {
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg,transparent,var(--cc-top,rgba(72,186,166,.35)),transparent);
}
.cc-top  { display:flex; align-items:center; justify-content:space-between; margin-bottom:.55rem; }
.cc-dot  { width:12px; height:12px; border-radius:50%; background:var(--dim); transition:all .3s; flex-shrink:0; }
.cc-dot.conn { background:var(--teal); box-shadow:0 0 8px rgba(72,186,166,.5); }
.cc-dot.rec  { background:var(--green); animation:pulse 1.6s infinite; }
.cc-stat-text { font-size:var(--t-lg); color:var(--cream); line-height:1; }
.cc-stat-text.conn { color:var(--teal); }
.cc-stat-text.rec  { color:var(--green); }
.cc-row  { display:flex; justify-content:space-between; padding:.32rem 0; border-bottom:1px solid var(--border); font-size:var(--t-sm); }
.cc-row:last-child { border-bottom:none; }
.cc-lbl  { color:var(--muted); }
.cc-val  { color:var(--cream); }

/* Impedance brain fill ——  flex: 1  so the SVG takes all remaining column space */
.imp-brain-wrap {
  flex:1; min-height:0;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.imp-brain-svg-container {
  flex:1; min-height:0;
  display:flex; align-items:center; justify-content:center;
  padding:.5rem;
}
.imp-brain-svg-container svg {
  /* width/height:100% set inline — max-width caps the single-col brain size */
  max-width:320px;
}
/* Impedance measure buttons row */
.imp-btn-row { flex-shrink:0; display:flex; gap:.4rem; padding:.3rem .5rem .55rem; justify-content:center; }

/* imp legend row */
.imp-legend { flex-shrink:0; display:flex; gap:.55rem; justify-content:center; padding:.2rem 0 .4rem; flex-wrap:wrap; }
.ileg { display:flex; align-items:center; gap:.22rem; font-size:var(--t-xxs); color:var(--muted); }
.ileg-dot { width:8px; height:8px; border-radius:50%; }

/* ── Col 2: Live EEG waveform ── */
.col-sig-header {
  flex-shrink:0; padding:.55rem .8rem; background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:.55rem;
}
.sig-title { font-size:var(--t-xs); color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.sig-tag {
  font-size:var(--t-xxs); color:var(--teal);
  background:rgba(72,186,166,.12); border:1px solid rgba(72,186,166,.25);
  border-radius:3px; padding:.12rem .38rem;
}
.wf-area { flex:1; overflow:hidden; position:relative; background:var(--bg4); }
.sig-ctrl {
  flex-shrink:0; padding:.42rem .8rem; border-top:1px solid var(--border);
  background:var(--bg2); display:flex; align-items:center; gap:.55rem; flex-wrap:wrap;
}
.ctrl-g { display:flex; align-items:center; gap:.3rem; }
.ctrl-l { font-size:var(--t-xs); color:var(--muted); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
.ctrl-sel,.ctrl-inp {
  background:var(--bg3); border:1px solid var(--border); border-radius:3px;
  color:var(--cream); font-size:var(--t-xs); outline:none;
  padding:.2rem .35rem;
}
.ctrl-inp { width:52px; }
.ctrl-sel option { background:var(--bg3); }
.wf-ch-lbl { position:absolute; left:.55rem; font-size:var(--t-xxs); color:var(--muted); z-index:1; pointer-events:none; }

/* ── Col 3: Subject + Record + Report ── */
/* Quality monitor section */
.qm-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:4px;
  padding:.6rem .7rem; margin-bottom:.6rem; flex-shrink:0;
}
.qm-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.25rem; font-size:var(--t-sm); }
.qm-label { color:var(--muted); }
.qm-val { font-family:'Crimson Pro',serif; font-size:var(--t-xl); line-height:1; color:var(--cream); }
.qm-val.green { color:var(--green); }
.qm-progress { height:5px; background:rgba(255,255,255,.06); border-radius:3px; margin:.35rem 0; }
.qm-prog-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--plum),var(--green)); transition:width .5s; }
.chpips { display:flex; gap:3px; margin-top:.35rem; }
.chp { flex:1; height:7px; border-radius:2px; background:var(--dim); transition:background .4s; }
.chp.exc{background:#68cc8a} .chp.goo{background:#96d8a4} .chp.por{background:#ccb474} .chp.bad{background:#cc7878}

/* Impedance bar list */
.imp-bars { flex-shrink:0; padding:.2rem .38rem .28rem; display:flex; flex-direction:column; gap:.13rem; border-top:1px solid var(--border); }
.imp-bar-row { display:flex; align-items:center; gap:.28rem; }
.imp-bar-lbl { font-size:var(--t-xxs); color:var(--muted); min-width:22px; letter-spacing:.04em; font-weight:500; }
.imp-bar-track { flex:1; height:4px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
.imp-bar-fill { height:100%; border-radius:2px; transition:width .4s ease; }
.imp-bar-ql { font-size:var(--t-xxs); min-width:13px; text-align:right; }

/* Record big button */
.rec-btn {
  width:100%; padding:.72rem 1rem; border-radius:4px; border:none;
  font-size:var(--t-base); font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  cursor:pointer; transition:all .2s; margin-bottom:.55rem;
}
.rec-btn.start { background:rgba(98,184,130,.18); border:1px solid rgba(98,184,130,.5); color:var(--green); }
.rec-btn.start:hover { background:rgba(98,184,130,.28); }
.rec-btn.stop  { background:rgba(192,112,114,.18); border:1px solid rgba(192,112,114,.5); color:var(--red); }
.rec-btn.stop:hover  { background:rgba(192,112,114,.28); }
.rec-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Report done card */
.report-done {
  background:rgba(98,184,130,.09); border:1px solid rgba(98,184,130,.32);
  border-radius:4px; padding:.6rem .7rem; margin-top:.55rem;
  animation:fadeUp .2s ease; flex-shrink:0;
}
.report-done-title { font-size:var(--t-sm); color:var(--green); font-weight:500; margin-bottom:.3rem; display:flex; align-items:center; gap:.35rem; }
.report-done-acts  { display:flex; gap:.35rem; margin-top:.4rem; }

/* Offline import zone (single only) */
.offline-zone {
  border:1px dashed rgba(72,186,166,.35); border-radius:4px;
  padding:.55rem .7rem; text-align:center; cursor:pointer;
  font-size:var(--t-sm); color:var(--muted); transition:all .15s; margin-top:.1rem;
}
.offline-zone:hover { border-color:rgba(72,186,166,.65); color:var(--mauve); background:rgba(72,186,166,.06); }

/* ═══════════════════════════════════════════════════════
   MULTI-DEVICE  —  N split panels, each w/ tabs
═══════════════════════════════════════════════════════ */
.multi-layout { display:flex; flex:1; gap:1px; background:var(--border); overflow:hidden; animation:fadeUp .2s ease; }
.multi-layout.n3 { flex-wrap:wrap; }
/* n4: proper 2×2 grid so panels never reflow/jump on tab switch */
.multi-layout.n4 { display:grid !important; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
.multi-layout.n4 .dev-panel { flex:none; min-height:0; }

.dev-panel {
  flex:1; min-width:0; background:var(--bg);
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.dev-panel::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--dc,var(--dim)); }

/* Panel header */
.dp-head {
  flex-shrink:0; background:var(--bg2); border-bottom:1px solid var(--border);
  padding:.55rem .75rem .4rem; padding-top:.7rem;
  display:flex; align-items:center; gap:.45rem;
}
.dp-dot { width:10px; height:10px; border-radius:50%; background:var(--dim); flex-shrink:0; transition:background .3s; }
.dev-panel.conn .dp-dot { background:var(--teal); }
.dev-panel.rec  .dp-dot { background:var(--green); animation:pulse 1.2s infinite; }
.dp-id   { font-size:var(--t-sm); font-weight:500; color:var(--dc,var(--dim)); letter-spacing:.08em; text-transform:uppercase; }
.dp-name { font-size:var(--t-sm); color:var(--text); }
.dp-status { font-size:var(--t-xs); color:var(--muted); }
.dev-panel.conn .dp-status { color:var(--teal); }
.dev-panel.rec  .dp-status { color:var(--green); }
.dp-head-btns { margin-left:auto; display:flex; gap:.35rem; }

/* Panel tabs */
.dp-tabs {
  flex-shrink:0; display:flex; gap:1px; background:var(--border);
  border-bottom:1px solid var(--border);
}
.dp-tab {
  flex:1; padding:.38rem .3rem; border:none; background:var(--bg4);
  color:var(--muted); font-size:var(--t-xs); letter-spacing:.06em;
  text-transform:uppercase; cursor:pointer; transition:all .15s; text-align:center;
}
.dp-tab:hover:not(.active) { color:var(--text); background:rgba(72,186,166,.07); }
.dp-tab.active { background:var(--bg); color:var(--cream); font-weight:500; }

/* Panel panes */
.dp-content { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
.dp-pane    { display:none; flex:1; min-height:0; overflow:hidden; flex-direction:column; }
.dp-pane.active { display:flex; }
.dp-pane-scroll { flex:1; overflow-y:auto; padding:.65rem .72rem; display:flex; flex-direction:column; }

/* Not connected notice */
.nc-notice {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:.55rem; padding:1.2rem; text-align:center;
}
.nc-glyph { font-family:'Crimson Pro',serif; font-style:italic; font-size:2.8rem; color:var(--dim); line-height:1; }
.nc-lbl   { font-size:var(--t-sm); color:var(--muted); }

/* Scanlines */
.scanlines {
  pointer-events:none; position:fixed; inset:0; z-index:999;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.026) 2px,rgba(0,0,0,.026) 4px);
  opacity:.5;
}

</style>
</head>
<body>
<div class="scanlines"></div>
<div id="app">

          <input class="ctrl-inp" value="1" type="number" min="0" max="40" oninput="updateFiltTag('filt-tag-s',this.value,null)">
          <span style="font-size:var(--t-xxs);color:var(--faint)">Hz</span>
        </div>
        <div class="ctrl-g"><span class="ctrl-l">低通</span>
          <input class="ctrl-inp" value="45" type="number" min="5" max="200">
          <span style="font-size:var(--t-xxs);color:var(--faint)">Hz</span>
        </div>
        <div class="ctrl-g"><span class="ctrl-l">陷波</span>
          <select class="ctrl-sel"><option>50 Hz</option><option>60 Hz</option><option>關閉</option></select>
        </div>
        <div class="ctrl-g"><span class="ctrl-l">幅度</span>
          <select class="ctrl-sel"><option>自動</option><option>100μV</option><option>200μV</option><option>500μV</option></select>
        </div>
        <div class="ctrl-g"><span class="ctrl-l">時窗</span>
          <select class="ctrl-sel"><option>4秒</option><option>8秒</option><option>12秒</option></select>
        </div>
      </div>
    </div>

    <!-- Col 3 -->
    <div class="col">
      <div class="col-inner">
        <div class="sh"><span class="sh-g">→</span>受測者資訊</div>
        ${buildSubjForm(1,'full')}

        <div class="sh" style="margin-top:.7rem"><span class="sh-g">●</span>錄製 · 報告</div>
        ${buildRecSection(1,true)}

        <div class="sh" style="margin-top:.7rem"><span class="sh-g">↑</span>離線分析</div>
        <div class="offline-zone" onclick="alert('選擇先前錄製的 CSV 檔案')">+ 讀取 CSV 生成報告</div>
      </div>
    </div>
  `;
  return w;
}

/* ─── MULTI ─── */
function buildMulti() {
  const w = document.createElement('div');
  w.className = `multi-layout n${n}`;
  for(let i=1;i<=n;i++) w.appendChild(buildPanel(i,n));
  return w;
}

function buildPanel(i, totalN) {
  const isConn=conn[i], isRec=rec[i];
  const s=SUBJ[i], c=DC[i];
  const at=dtab[i];
  const stCls = isRec?'rec':isConn?'conn':'';
  const statusTxt = isRec?`錄製中 ${fmt(ela[i])}`:isConn?'已連線':'未連線';

  const p = document.createElement('div');
  p.className = `dev-panel ${stCls}`;
  p.id = `panel-${i}`;
  p.style.setProperty('--dc',c);
  p.innerHTML = `
    <div class="dp-head">
      <div class="dp-dot"></div>
      <div class="dp-id">D${i}</div>
      <div class="dp-name">${isConn?s.name||'未登錄':''}</div>
      <div class="dp-status">· ${statusTxt}</div>
      <div class="dp-head-btns">
        ${isRec?`<button class="btn btn-sm btn-red" onclick="stopRec(${i})">■ 停止</button>`:''}
        ${isConn&&!isRec?`<button class="btn btn-sm btn-green" onclick="startRec(${i})">⬤ 錄製</button>`:''}
        ${!isConn?`<button class="btn btn-sm btn-teal" onclick="connectDev(${i})">連線</button>`:''}
        ${isConn&&!isRec?`<button class="btn btn-sm" onclick="disconnectDev(${i})" style="color:var(--red);border-color:rgba(192,112,114,.3)">斷開</button>`:''}
      </div>
    </div>
    <div class="dp-tabs">
      <button class="dp-tab${at==='connect'?' active':''}" onclick="setTab(${i},'connect',this)">連線 · 阻抗</button>
      <button class="dp-tab${at==='signal'?' active':''}"  onclick="setTab(${i},'signal',this)">訊號</button>
      <button class="dp-tab${at==='record'?' active':''}"  onclick="setTab(${i},'record',this)">記錄 · 報告</button>
    </div>
    <div class="dp-content">

      <!-- Connect+Impedance pane — layout depends on totalN -->
      ${totalN===4
        ? /* n=4: CC card LEFT | brain+bars RIGHT (side-by-side) */
          `<div class="dp-pane${at==='connect'?' active':''}" id="pane-connect-${i}" style="flex-direction:row">
            <div style="flex:1;min-width:0;border-right:1px solid var(--border);overflow-y:auto;padding:.32rem .42rem">
              ${buildCC(i)}
            </div>
            ${isConn ? `
              <div style="flex:2;min-width:0;display:flex;flex-direction:column;overflow:hidden">
                <div class="sh" style="flex-shrink:0;margin:.1rem .42rem .08rem;padding-bottom:.15rem">
                  <span class="sh-g">~</span>電極阻抗
                  <button class="btn btn-sm btn-amber" style="margin-left:auto;padding:.14rem .32rem;font-size:var(--t-xxs)" onclick="alert('量測')">量測</button>
                  <button class="btn btn-sm" style="padding:.14rem .32rem;font-size:var(--t-xxs)" onclick="alert('停止')">停止</button>
                </div>
                <div style="flex:1;min-height:0;display:flex;overflow:hidden">
                  <div style="flex:1;min-width:0;overflow:hidden;position:relative">
                    ${buildImpSvg(i,'compact')}
                  </div>
                  ${buildImpBarsVertical(i)}
                </div>
              </div>
            ` : `<div class="nc-notice" style="flex:2"><div class="nc-glyph">○</div><div class="nc-lbl">請先連線</div></div>`}
          </div>`
        : /* n≤3: CC top, brain fills space, bars at bottom */
          `<div class="dp-pane${at==='connect'?' active':''}" id="pane-connect-${i}">
            <div style="flex-shrink:0;padding:.35rem .6rem .06rem">
              ${buildCC(i)}
            </div>
            <div class="sh" style="flex-shrink:0;margin:.1rem .6rem .1rem;padding-bottom:.18rem">
              <span class="sh-g">~</span>電極阻抗
              ${isConn ? `
                <button class="btn btn-sm btn-amber" style="margin-left:auto;padding:.18rem .42rem;font-size:var(--t-xxs)" onclick="alert('量測阻抗')">量測</button>
                <button class="btn btn-sm" style="padding:.18rem .42rem;font-size:var(--t-xxs)" onclick="alert('停止量測')">停止</button>
              ` : ''}
            </div>
            ${isConn ? `
              <div style="flex:1;min-height:0;overflow:hidden;position:relative">
                ${buildImpSvg(i,'compact')}
              </div>
              ${buildImpBars(i)}
            ` : `<div class="nc-notice"><div class="nc-glyph">○</div><div class="nc-lbl">請先連線裝置</div></div>`}
          </div>`}

      <!-- Signal pane -->
      <div class="dp-pane${at==='signal'?' active':''}" id="pane-signal-${i}">
        ${isConn ? `
          <div class="col-sig-header" style="padding:.42rem .72rem">
            <div class="sig-title" style="font-size:var(--t-xxs)">EEG 訊號 D${i}</div>
            <span class="sig-tag" style="font-size:var(--t-xxs)">1–45Hz · 50Hz</span>
          </div>
          <div class="wf-area" id="wf-${i}" style="flex:1"></div>
          <div class="sig-ctrl" style="padding:.3rem .72rem">
            <div class="ctrl-g"><span class="ctrl-l" style="font-size:var(--t-xxs)">陷波</span>
              <select class="ctrl-sel"><option>50Hz</option><option>60Hz</option><option>關</option></select></div>
            <div class="ctrl-g"><span class="ctrl-l" style="font-size:var(--t-xxs)">幅度</span>
              <select class="ctrl-sel"><option>自動</option><option>100μV</option></select></div>
            <div class="ctrl-g"><span class="ctrl-l" style="font-size:var(--t-xxs)">時窗</span>
              <select class="ctrl-sel"><option>4秒</option><option>8秒</option></select></div>
            <button class="btn btn-sm" style="margin-left:auto;font-size:var(--t-xxs)">M</button>
          </div>
        ` : `<div class="nc-notice"><div class="nc-glyph">○</div><div class="nc-lbl">請先連線裝置</div></div>`}
      </div>

      <!-- Record+Report pane -->
      <div class="dp-pane${at==='record'?' active':''}" id="pane-record-${i}">
        <div class="dp-pane-scroll">
          <div class="sh"><span class="sh-g">→</span>受測者</div>
          ${buildSubjForm(i,'compact')}
          <div class="sh" style="margin-top:.55rem"><span class="sh-g">●</span>記錄 · 報告</div>
          ${buildRecSection(i,false)}
        </div>
      </div>

    </div>`;
  return p;
}

/* ─── Sub-builders ─── */

function buildCC(i) {
  const isConn=conn[i], isRec=rec[i];
  const topColor = isConn ? 'rgba(72,186,166,.4)' : 'rgba(72,186,166,.3)';
  return `
    <div class="cc" style="--cc-top:${topColor}">
      <div class="cc-top">
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="cc-dot${isRec?' rec':isConn?' conn':''}"></div>
          <div class="cc-stat-text${isRec?' rec':isConn?' conn':''}">
            ${isRec?'錄製中':isConn?'已連線':'未連線'}
          </div>
        </div>
        ${isConn
          ? `<button class="btn btn-sm btn-red" onclick="disconnectDev(${i})">斷開連線</button>`
          : `<button class="btn btn-sm btn-teal" onclick="connectDev(${i})">連線裝置</button>`}
      </div>
      ${isConn ? `
        <div class="cc-row"><span class="cc-lbl">裝置序號</span><span class="cc-val" style="font-size:var(--t-xs)">${DID[i]}</span></div>
        <div class="cc-row"><span class="cc-lbl">採樣率</span><span class="cc-val">1000 Hz</span></div>
        <div class="cc-row"><span class="cc-lbl">封包速率</span><span class="cc-val" style="color:var(--teal)">250 pkt/s</span></div>
      ` : `
        <div style="font-size:var(--t-sm);color:var(--muted);line-height:1.65;padding-top:.15rem">
          點擊「連線裝置」，於彈出視窗選擇 COM 埠。<br>需要 Chrome / Edge 89+（Web Serial API）。
        </div>
      `}
    </div>`;
}

function buildImpSvg(i, mode) {
  const q = IMP_Q[i] || IMP_Q[1];
  const fs = mode==='full' ? 9 : 7;
  const r  = mode==='full' ? 12 : 10;
  const dots = ELEC.map((e,k)=>`
    <circle cx="${e.cx}" cy="${e.cy}" r="${r}" fill="${IMP_F[q[k]]}" stroke="${IMP_C[q[k]]}" stroke-width="1.6"/>
    <text x="${e.cx}" y="${e.cy+3.5}" text-anchor="middle" fill="${IMP_C[q[k]]}" font-size="${fs}" font-family="monospace" font-weight="500">${e.l}</text>
  `).join('');
  // compact: position:absolute so SVG never drives its container's size
  // full: normal flow inside .imp-brain-svg-container (CSS class handles sizing)
  const svgStyle = mode === 'compact'
    ? 'position:absolute;inset:0;width:100%;height:100%'
    : 'width:100%;height:100%;display:block';
  return `<svg viewBox="0 0 200 240" preserveAspectRatio="xMidYMid meet" style="${svgStyle}">
    <ellipse cx="100" cy="118" rx="74" ry="88" fill="none" stroke="rgba(180,168,215,0.13)" stroke-width="1.5"/>
    <path d="M92,32 Q100,22 108,32" fill="none" stroke="rgba(180,168,215,0.13)" stroke-width="1.3"/>
    <path d="M26,108 Q17,118 26,128" fill="none" stroke="rgba(180,168,215,0.13)" stroke-width="1.3"/>
    <path d="M174,108 Q183,118 174,128" fill="none" stroke="rgba(180,168,215,0.13)" stroke-width="1.3"/>
    ${dots}
  </svg>`;
}

function buildImpBars(i) {
  // Single gradient scale bar — matches sgimacog-web ImpedanceView legend
  return `<div style="flex-shrink:0;padding:.22rem .5rem .32rem;border-top:1px solid var(--border)">
    <div style="height:7px;border-radius:4px;background:linear-gradient(90deg,#68cc8a 0%,#9ed070 30%,#d8c060 62%,#d07070 100%);margin-bottom:.18rem"></div>
    <div style="display:flex;justify-content:space-between;font-size:.62rem;line-height:1.4">
      <div><div style="color:#68cc8a;font-weight:500">優秀</div><div style="color:var(--muted)">&lt;150kΩ</div></div>
      <div style="text-align:center"><div style="color:#9ed070;font-weight:500">良好</div><div style="color:var(--muted)">&lt;300kΩ</div></div>
      <div style="text-align:center"><div style="color:#d8c060;font-weight:500">尚可</div><div style="color:var(--muted)">&lt;600kΩ</div></div>
      <div style="text-align:right"><div style="color:#d07070;font-weight:500">不良</div><div style="color:var(--muted)">≥600kΩ</div></div>
    </div>
  </div>`;
}

function buildImpBarsVertical(i) {
  // Narrow vertical gradient scale bar — for n=4 layout (right of brain SVG)
  return `<div style="flex-shrink:0;display:flex;align-items:stretch;padding:.3rem .22rem .3rem .08rem">
    <div style="width:8px;border-radius:3px;flex-shrink:0;background:linear-gradient(180deg,#68cc8a 0%,#9ed070 30%,#d8c060 62%,#d07070 100%)"></div>
    <div style="display:flex;flex-direction:column;justify-content:space-between;padding-left:.14rem;font-size:.5rem;line-height:1.2">
      <div><div style="color:#68cc8a;font-weight:500">優</div><div style="color:var(--muted)">&lt;150</div></div>
      <div><div style="color:#9ed070;font-weight:500">良</div><div style="color:var(--muted)">&lt;300</div></div>
      <div><div style="color:#d8c060;font-weight:500">可</div><div style="color:var(--muted)">&lt;600</div></div>
      <div><div style="color:#d07070;font-weight:500">差</div><div style="color:var(--muted)">≥600</div></div>
    </div>
  </div>`;
}

function buildElecLabels(i) {
  const q = IMP_Q[i]||IMP_Q[1];
  const rows = ELEC.map((e,k)=>{
    const qk=q[k], col=IMP_C[qk];
    return `<div style="display:flex;align-items:center;gap:.22rem">
      <div style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <span style="font-size:var(--t-xxs);color:var(--muted);min-width:22px;font-weight:500">${e.l}</span>
      <span style="font-size:var(--t-xxs);color:${col}">${QL[qk]}</span>
    </div>`;
  }).join('');
  const lgnd = ['exc','goo','por','bad'].map(qv=>{
    return `<div style="display:flex;align-items:center;gap:.12rem;font-size:.52rem;color:var(--muted)">
      <div style="width:5px;height:5px;border-radius:50%;background:${IMP_C[qv]}"></div>${QL[qv]}</div>`;
  }).join('');
  return `<div style="flex:1;border-left:1px solid var(--border);padding:.3rem .3rem;display:flex;flex-direction:column;gap:.18rem;overflow-y:auto;min-width:0">
    ${rows}
    <div style="margin-top:auto;padding-top:.2rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:.1rem .18rem">${lgnd}</div>
  </div>`;
}

function buildSubjForm(i, mode) {
  const s=SUBJ[i];
  if (mode === 'compact') {
    // Single inline row — minimal height for multi-device panels
    return `
    <div style="display:flex;gap:.28rem;align-items:flex-end;margin-bottom:.38rem;flex-wrap:nowrap">
      <div style="flex:1.1;min-width:0">
        <div class="fl" style="white-space:nowrap">編號</div>
        <input class="fi" value="${s.id}" placeholder="PT-…" style="min-width:0">
      </div>
      <div style="flex:1.3;min-width:0">
        <div class="fl" style="white-space:nowrap">姓名</div>
        <input class="fi" value="${s.name}" placeholder="姓名" style="min-width:0">
      </div>
      <div style="flex:1.3;min-width:0">
        <div class="fl" style="white-space:nowrap">出生日期</div>
        <input class="fi" value="${s.dob}" placeholder="YYYY-MM-DD" style="min-width:0">
      </div>
      <div style="flex-shrink:0">
        <div class="fl">性別</div>
        <div class="sex-tog" style="width:68px">
          <button class="sex-btn${s.sex==='M'?' on':''}" onclick="setSex(this)">男</button>
          <button class="sex-btn${s.sex==='F'?' on':''}" onclick="setSex(this)">女</button>
          <button class="sex-btn${s.sex==='O'?' on':''}" onclick="setSex(this)">其</button>
        </div>
      </div>
    </div>
    <label class="tog-row" style="margin-bottom:.38rem;font-size:var(--t-xxs)">
      <input type="checkbox" checked>已取得知情同意
    </label>`;
  }
  // full mode (single device col 3)
  return `
    <div class="ff"><label class="fl">受試者編號</label>
      <input class="fi" value="${s.id}" placeholder="例：PT-2025-001"></div>
    <div class="ff"><label class="fl">姓名</label>
      <input class="fi" value="${s.name}" placeholder="受試者姓名"></div>
    <div class="frow">
      <div class="ff"><label class="fl">出生年月日</label>
        <input class="fi" value="${s.dob}" placeholder="YYYY-MM-DD"></div>
      <div class="ff" style="max-width:112px"><label class="fl">性別</label>
        <div class="sex-tog">
          <button class="sex-btn${s.sex==='M'?' on':''}" onclick="setSex(this)">男</button>
          <button class="sex-btn${s.sex==='F'?' on':''}" onclick="setSex(this)">女</button>
          <button class="sex-btn${s.sex==='O'?' on':''}" onclick="setSex(this)">其他</button>
        </div></div>
    </div>
    <div class="ff"><label class="fl">備注</label>
      <textarea class="fi" rows="2" style="height:46px" placeholder="評估備注…">${s.notes}</textarea></div>
    <label class="tog-row" style="margin-bottom:.55rem">
      <input type="checkbox" checked>已向受測者說明，取得知情同意
    </label>`;
}

function buildRecSection(i, showOffline) {
  const isConn=conn[i], isRec=rec[i];
  const q = IMP_Q[i]||IMP_Q[1];
  const qPct = [0,81,91,72,85][i]||80;
  const prog = Math.min(100, durSel[i]===5?0 : Math.round(ela[i]/DUR_SEC[durSel[i]]*100));

  const durOptions = DUR_OPTS.map((d,k)=>`<option value="${k}" ${durSel[i]===k?'selected':''}>${d}</option>`).join('');
  const afterOptions = `
    <option>存檔＋報告</option>
    <option>僅存 CSV</option>
    <option>僅生成報告</option>`;

  return `
    <div class="frow" style="margin-bottom:.55rem">
      <div class="ff">
        <label class="fl">目標時長</label>
        <select class="fsel" onchange="setDur(${i},this.value)">${durOptions}</select>
      </div>
      <div class="ff">
        <label class="fl">錄製後自動</label>
        <select class="fsel">${afterOptions}</select>
      </div>
    </div>
    <!-- Sensitivity: 5-level quality threshold matching sgimacog-web RecordView -->
    <div style="margin-bottom:.55rem">
      <label class="fl">靈敏度（有效信號門檻）</label>
      <div style="display:flex;gap:3px">
        ${[1,2,3,4,5].map(lv=>{
          const isOn=sensLvl[i]===lv;
          return `<button onclick="setSens(${i},${lv})" style="flex:1;padding:.32rem .1rem;border-radius:2px;
            border:1px solid ${isOn?'rgba(72,186,166,.55)':'var(--border)'};
            background:${isOn?'rgba(72,186,166,.15)':'var(--bg3)'};
            color:${isOn?'var(--teal)':'var(--muted)'};
            font-size:var(--t-sm);cursor:pointer;line-height:1;text-align:center;font-weight:${isOn?'500':'400'}">
            ${lv}
          </button>`;
        }).join('')}
      </div>
    </div>

    <!-- Quality monitor toggle -->
    <div class="qm-card" id="qm-${i}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem">
        <span style="font-size:var(--t-xs);color:var(--muted);letter-spacing:.06em;text-transform:uppercase">即時訊號品質</span>
        <label class="tog-row" style="gap:.3rem">
          <input type="checkbox" ${qualOn[i]?'checked':''} onchange="toggleQual(${i},this.checked)">
          <span style="font-size:var(--t-xs)">${qualOn[i]?'啟用':'關閉'}</span>
        </label>
      </div>
      ${isRec&&qualOn[i] ? `
        <div style="display:flex;margin-bottom:.35rem">
          <div style="flex:1;text-align:center;padding:.08rem .15rem">
            <div style="font-size:var(--t-xs);color:var(--muted);margin-bottom:.1rem">錄製時間</div>
            <div style="font-family:'Crimson Pro',serif;font-size:var(--t-xl);color:var(--green);line-height:1" id="re-${i}">${fmt(ela[i])}</div>
          </div>
          <div style="flex:1;text-align:center;padding:.08rem .15rem;border-left:1px solid var(--border);border-right:1px solid var(--border)">
            <div style="font-size:var(--t-xs);color:var(--muted);margin-bottom:.1rem">有效時間</div>
            <div style="font-family:'Crimson Pro',serif;font-size:var(--t-xl);color:var(--teal);line-height:1" id="rg-${i}">${fmt(good[i])}</div>
          </div>
          <div style="flex:1;text-align:center;padding:.08rem .15rem">
            <div style="font-size:var(--t-xs);color:var(--muted);margin-bottom:.1rem">訊號品質</div>
            <div style="font-family:'Crimson Pro',serif;font-size:var(--t-xl);color:${qPct>=80?'var(--green)':qPct>=50?'var(--amber)':'var(--red)'};line-height:1">${qPct}%</div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:var(--t-xs);color:var(--muted);margin-bottom:.2rem">
          <span>進度</span><span id="rp-pct-${i}">${prog}%</span>
        </div>
        <div class="qm-progress"><div class="qm-prog-fill" id="rp-bar-${i}" style="width:${prog}%"></div></div>
        <div class="chpips" style="margin-top:.4rem">${q.map(c=>`<div class="chp ${c}"></div>`).join('')}</div>
        <div style="font-size:var(--t-xxs);color:var(--faint);margin-top:.2rem">▲ 8ch 電極品質即時指示</div>
      ` : isRec ? `
        <div style="font-size:var(--t-sm);color:var(--muted)">品質監控已關閉</div>
        <div style="font-family:'Crimson Pro',serif;font-size:var(--t-xl);color:var(--green);margin-top:.25rem" id="re-${i}">${fmt(ela[i])}</div>
      ` : `
        <div style="font-size:var(--t-sm);color:var(--faint)">錄製後顯示即時數據</div>
      `}
    </div>

    ${!isConn
      ? `<button class="rec-btn start" disabled style="opacity:.4;cursor:not-allowed">⬤ 開始錄製</button>
         <div style="font-size:var(--t-xs);color:var(--muted);text-align:center;margin-top:.3rem">請先連線裝置</div>`
      : isRec
      ? `<button class="rec-btn stop" onclick="stopRec(${i})">■ 停止錄製</button>`
      : `<button class="rec-btn start" onclick="startRec(${i})">⬤ 開始錄製</button>`
    }`;
}

/* ═══════════════════════════════════════════════════════
   BANNER
═══════════════════════════════════════════════════════ */
function renderBanner() {
  const wrap = document.getElementById('banner-devs');
  wrap.innerHTML = '';
  for(let i=1;i<=n;i++) {
    const isRec=rec[i], isConn=conn[i];
    const prog = durSel[i]===5 ? 0 : Math.min(100, Math.round(ela[i]/DUR_SEC[durSel[i]]*100));
    const card = document.createElement('div');
    card.className = `bdc${isRec?' rec':isConn?' conn':''}`;
    card.style.setProperty('--dc', DC[i]);
    card.onclick = ()=>focusDevice(i);
    card.innerHTML = `
      <div class="bdc-dot"></div>
      <div style="flex:1;min-width:0">
        <div class="bdc-name">${isConn?(SUBJ[i].name||`設備 ${i}`):`D${i} · 未連線`}</div>
        <div class="bdc-detail">D${i}${isConn?' · '+DID[i].replace('STEEG_',''):''} ${isConn?'· '+DUR_OPTS[durSel[i]]:''}</div>
        ${isConn?`<div class="bdc-prog"><div class="bdc-prog-fill" style="width:${prog}%" id="bpf-${i}"></div></div>`:''}
      </div>
      <div style="flex-shrink:0;text-align:right">
        <div class="bdc-elapsed" id="be-${i}">${isRec||ela[i]>0?fmt(ela[i]):'--:--'}</div>
        <div class="bdc-qual">${isRec?`品質 ${[81,91,72,85][i-1]}%`:isConn?'待機':''}</div>
      </div>`;
    wrap.appendChild(card);
  }
  const anyRec = rec.slice(1,n+1).some(Boolean);
  document.getElementById('sync-start').style.display = anyRec?'none':'';
  document.getElementById('sync-stop').style.display  = anyRec?'':'none';
}

/* ═══════════════════════════════════════════════════════
   WAVEFORM
═══════════════════════════════════════════════════════ */
function buildWF(containerId, devIdx) {
  const el=document.getElementById(containerId);
  if(!el) return;
  el.innerHTML='';
  const nCh=CH_L.length, rh=100/nCh;
  CH_L.forEach((ch,i)=>{
    const row=document.createElement('div');
    row.style.cssText=`position:absolute;top:${i*rh}%;height:${rh}%;left:0;right:0;overflow:hidden`;
    // label
    const lbl=document.createElement('div');
    lbl.className='wf-ch-lbl'; lbl.textContent=ch;
    lbl.style.cssText='position:absolute;left:.55rem;top:50%;transform:translateY(-50%)';
    // trace
    const trace=document.createElement('div');
    trace.style.cssText='position:absolute;left:42px;right:0;top:0;bottom:0;overflow:hidden';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 1200 40');
    svg.setAttribute('preserveAspectRatio','none');
    const spd=(3.8+devIdx*.4+i*.13).toFixed(2);
    svg.style.cssText=`width:200%;height:100%;animation:waveScr ${spd}s linear infinite`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',genEeg(devIdx,i));
    path.setAttribute('fill','none');
    path.setAttribute('stroke',CH_C[i]);
    path.setAttribute('stroke-width','0.85');
    path.setAttribute('opacity','0.85');
    svg.appendChild(path); trace.appendChild(svg);
    // divider
    const line=document.createElement('div');
    line.style.cssText='position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)';
    row.appendChild(lbl); row.appendChild(trace); row.appendChild(line);
    el.appendChild(row);
  });
}
function genEeg(dev,ch) {
  const pts=[],N=1200,seed=dev*1.18+ch*.82,af=10+(dev-1)*.5+ch*.12;
  for(let x=0;x<N;x++){
    const t=x/N;
    let y=20;
    y+=8.5*Math.sin(2*Math.PI*af*t+seed);
    y+=3.5*Math.sin(2*Math.PI*5*t+seed*1.3);
    y+=1.5*Math.sin(2*Math.PI*22*t+seed*2.1);
    y+=0.8*Math.sin(2*Math.PI*.9*t+seed*.5);
    if(Math.random()<.0012)y+=(Math.random()-.5)*26;
    pts.push(`${x},${y.toFixed(1)}`);
  }
  return 'M '+pts.join(' L ');
}

/* ═══════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════ */
function changeCount(d){ const nx=Math.max(1,Math.min(4,n+d)); if(nx!==n){n=nx;render();} }
function setSex(btn){ btn.closest('.sex-tog').querySelectorAll('.sex-btn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
function setDur(i,v){ durSel[i]=parseInt(v); }
function setSens(i,lv){ sensLvl[i]=lv; render(); }
function toggleQual(i,v){ qualOn[i]=v; render(); }
function updateFiltTag(id,hp,lp){ const el=document.getElementById(id); if(el) el.textContent=`${hp||1}–45 Hz · 50 Hz 陷波`; }

function connectDev(i)    { conn[i]=true;  render(); }
function disconnectDev(i) { conn[i]=false; rec[i]=false; stopTimer(i); render(); }
function startRec(i)      { rec[i]=true;   startTimer(i); render(); }
function stopRec(i)       { rec[i]=false;  stopTimer(i);  render(); }

function masterConnect(){ for(let i=1;i<=n;i++)conn[i]=true; render(); }
function masterRecord() { for(let i=1;i<=n;i++) if(conn[i]){rec[i]=true;startTimer(i);} render(); }
function masterStop()   { for(let i=1;i<=n;i++){rec[i]=false;stopTimer(i);} render(); }

function setTab(i,tab,btn){
  dtab[i]=tab;
  const panel=document.getElementById(`panel-${i}`);
  if(!panel)return;
  panel.querySelectorAll('.dp-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.dp-pane').forEach(p=>p.classList.remove('active'));
  panel.querySelector(`#pane-${tab}-${i}`)?.classList.add('active');
  if(tab==='signal'&&conn[i]) buildWF(`wf-${i}`,i);
}

function focusDevice(i){
  if(n===1)return;
  const panel=document.getElementById(`panel-${i}`);
  if(!panel)return;
  const tabs=panel.querySelectorAll('.dp-tab');
  if(tabs[1]) setTab(i,'signal',tabs[1]);
}

/* Timers */
function startTimer(i){
  stopTimer(i);
  timers[i]=setInterval(()=>{
    if(!rec[i]){stopTimer(i);return;}
    ela[i]++; good[i]=Math.floor(ela[i]*[.81,.91,.72,.85][i-1]);
    smpl[i]=ela[i];
    // live DOM updates
    _t(`re-${i}`,fmt(ela[i])); _t(`rg-${i}`,fmt(good[i]));
    const tSec=DUR_SEC[durSel[i]];
    const pg=tSec===Infinity?0:Math.min(100,Math.round(ela[i]/tSec*100));
    _t(`rp-pct-${i}`,pg+'%'); _w(`rp-bar-${i}`,pg+'%');
    // banner
    _t(`be-${i}`,fmt(ela[i])); _w(`bpf-${i}`,pg+'%');
    // panel status
    const ph=document.querySelector(`#panel-${i} .dp-status`);
    if(ph) ph.textContent=`· 錄製中 ${fmt(ela[i])}`;
    const bh=document.querySelector(`#panel-${i} .dp-head .bdc-elapsed`);
    // auto-stop when target reached (not manual)
    if(tSec!==Infinity&&ela[i]>=tSec){ stopRec(i); render(); }
  },1000);
}
function stopTimer(i){ if(timers[i]){clearInterval(timers[i]);delete timers[i];} }
function _t(id,v){ const e=document.getElementById(id); if(e)e.textContent=v; }
function _w(id,v){ const e=document.getElementById(id); if(e)e.style.width=v; }
function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  ela[1]=167; good[1]=135; smpl[1]=167; rec[1]=true;
  startTimer(1);
  render();
});
</script>
